version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sketchbattle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sketchbattle
      POSTGRES_PASSWORD: sketchbattle_dev
      POSTGRES_DB: sketchbattle
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: sketchbattle-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
